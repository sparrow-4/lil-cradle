<div *ngIf="isReady">

  <!-- MOBILE MENU BUTTON -->
  <button (click)="toggleMenu()" class="md:hidden relative z-50">
    <lucide-icon 
      [img]="isMenuOpen ? icons.close : icons.menu" 
      class="w-6 h-6 transition-all duration-300">
    </lucide-icon>
  </button>

  <!-- BACKDROP -->
  <div 
    *ngIf="isMenuOpen" 
    (click)="toggleMenu()"
    class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40">
  </div>

  <!-- SIDE MENU -->
  <div 
    class="fixed top-0 right-0 h-screen w-[80%] max-w-[320px] 
           bg-white z-50 transform transition-transform duration-300 ease-in-out 
           shadow-xl rounded-l-2xl flex flex-col"
    [class.translate-x-0]="isMenuOpen"
    [class.translate-x-full]="!isMenuOpen"
  >

    <!-- HEADER -->
    <div class="bg-[#0F83B2] text-white pt-1 pb-12 px-2 relative">

      <!-- Wave -->
      <div class="absolute -bottom-5 left-0 w-full overflow-hidden leading-none">
        <svg viewBox="0 0 1200 60" class="w-full h-8">
          <path 
            d="M0,0 L0,30 Q30,60 60,30 T120,30 T180,30 T240,30 T300,30 T360,30 T420,30 T480,30 T540,30 T600,30 T660,30 T720,30 T780,30 T840,30 T900,30 T960,30 T1020,30 T1080,30 T1140,30 T1200,30 L1200,0 Z"
            fill="#0F83B2"
          />
        </svg>
      </div>

    </div>

    <!-- SCROLLABLE CONTENT -->
    <div class="flex-1 overflow-y-auto">

      <!-- MENU ITEMS -->
      <div class="p-6 space-y-6 text-gray-700 text-[16px] font-medium mt-2">
        <a routerLink="/" (click)="toggleMenu()" class="block hover:text-[#0F83B2] transition">Home</a>
        <a routerLink="/shop" (click)="toggleMenu()" class="block hover:text-[#0F83B2] transition">Shop</a>
        <a routerLink="/blog" (click)="toggleMenu()" class="block hover:text-[#0F83B2] transition">Journal</a>
        <a routerLink="/contact" (click)="toggleMenu()" class="block hover:text-[#0F83B2] transition">Contact</a>
      </div>

      <!-- DIVIDER -->
      <div class="border-t mx-6"></div>

      <!-- AUTH -->
      <div class="p-6 space-y-3">
        <!-- Public / Not Logged In -->
        <ng-container *ngIf="!auth.isAdmin() && !auth.isLoggedUser()">
          <a routerLink="/login" (click)="toggleMenu()" class="block w-full border border-[#0F83B2] text-[#0F83B2] py-2.5 rounded-full font-bold text-center">
            Login
          </a>
          <a routerLink="/login" (click)="toggleMenu()" class="block w-full bg-[#0F83B2] text-white py-2.5 rounded-full font-bold text-center">
            Register
          </a>
        </ng-container>

        <!-- Logged in as User -->
        <ng-container *ngIf="auth.isLoggedUser()">
          <p class="text-center font-bold text-gray-800 text-sm mb-4">Welcome back, Shopper!</p>
          <button (click)="logout()" class="block w-full border border-gray-300 text-gray-600 py-2.5 rounded-full font-bold hover:bg-gray-50 text-center">
            Logout
          </button>
        </ng-container>

        <!-- Logged in as Admin -->
        <ng-container *ngIf="auth.isAdmin()">
          <a routerLink="/admin/dashboard" (click)="toggleMenu()" class="block w-full bg-gray-900 text-white py-2.5 rounded-full font-bold text-center">
            ⚙️ Admin Dashboard
          </a>
          <button (click)="logout()" class="block w-full border border-red-500 text-red-500 py-2.5 rounded-full font-bold mt-2 text-center">
            Logout Admin
          </button>
        </ng-container>
      </div>

    </div>

    <!-- 🔥 IMAGE FIXED AT BOTTOM -->
   

  </div>

</div>
