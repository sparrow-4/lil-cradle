<section class="max-w-[1200px] mx-auto px-6 py-12">
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

    <!-- Promo Banner Loop -->
    <div *ngFor="let promo of promos"
         class="rounded-3xl p-8 relative flex items-center h-[250px] overflow-hidden group shadow-sm transition hover:shadow-md"
         [style.backgroundColor]="promo.bgColor">
      
      <!-- Content -->
      <div class="relative z-10 w-1/2">
        <span class="text-xs tracking-widest uppercase font-bold mb-2 block" [style.color]="promo.tagColor">
          {{ promo.tag }}
        </span>
        
        <h3 class="text-2xl lg:text-3xl font-extrabold text-gray-800 leading-tight mb-6 transition" 
            [innerHTML]="promo.headline"
            [style.color]="'#374151'"> <!-- default gray-800 -->
        </h3>
        
        <a routerLink="/shop" class="inline-block px-6 py-2 rounded-full font-bold shadow-sm hover:shadow transition"
           [style.backgroundColor]="promo.buttonBg" [style.color]="'white'">
          {{ promo.buttonText }}
        </a>
      </div>

      <!-- Image -->
      <div class="absolute right-0 bottom-0 w-1/2 h-full flex justify-end items-end p-4">
        <!-- Optional Decorative circle behind image -->
        <div class="absolute w-[180px] h-[180px] bg-white rounded-full opacity-40 bottom-2 right-2"></div>
        <img [src]="promo.image" alt="Promo image" class="relative z-10 h-[90%] object-contain group-hover:scale-105 transition duration-500">
      </div>

    </div>

  </div>
</section>
