<nav class="bg-white shadow-sm relative z-50 mt-4 md:mt-[25px]">

  <div class="max-w-[1440px] mx-auto px-4 md:px-6 h-[40px] md:h-[90px] flex items-center justify-between">
    
    <!-- LEFT -->
    <div class="flex items-center">
      <img src="images/lil-c.png" class="h-20 md:h-40 object-contain">
    </div>

    <!-- CENTER (DESKTOP ONLY) -->
    <div class="hidden md:flex gap-10 text-gray-700 text-[15px] font-medium">
      <a routerLink="/" class="hover:text-[#0F83B2] transition">Home</a>
      <a routerLink="/shop" class="hover:text-[#0F83B2] transition">Shop</a>
      <a routerLink="/blog" class="hover:text-[#0F83B2] transition">Journal</a>
      <a routerLink="/contact" class="hover:text-[#0F83B2] transition">Contact</a>
    </div>

    <!-- RIGHT -->
    <div class="flex items-center gap-3 md:gap-6">

      <!-- Search (hidden on small) -->
      <div class="hidden sm:flex items-center border border-gray-300 rounded-full px-3 py-1 md:px-4 md:py-2">
        <input 
          type="text" 
          placeholder="Search" 
          class="outline-none text-sm px-2 w-24 md:w-40"
        />
        <lucide-icon [img]="icons.search" class="w-4 h-4 text-gray-600"></lucide-icon>
      </div>

      <!-- Cart -->
      <div class="relative cursor-pointer" routerLink="/cart">
        <lucide-icon [img]="icons.cart" class="w-5 h-5 text-gray-700"></lucide-icon>
        <span *ngIf="cart.items().length > 0" class="absolute -top-2 -right-2 bg-red-400 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">
          {{ cart.items().length }}
        </span>
      </div>

      <!-- Profile -->
      <div class="flex items-center gap-3">
        @if (auth.isLoggedUser()) {
          <a routerLink="/profile" class="flex items-center gap-2 group">
            <div class="w-8 h-8 rounded-full bg-[#C5A059] flex items-center justify-center text-white text-xs font-serif group-hover:scale-105 transition-transform">
              {{ (auth.currentUser()?.name || 'U')[0].toUpperCase() }}
            </div>
          </a>
        } @else if (auth.isAdmin()) {
          <a routerLink="/admin/dashboard" class="flex items-center gap-2 group">
            <div class="w-8 h-8 rounded-full bg-[#3D2B1F] flex items-center justify-center text-white text-xs font-serif group-hover:scale-105 transition-transform">
              A
            </div>
          </a>
        } @else {
          <a routerLink="/login" class="text-gray-700 hover:text-[#C5A059] transition">
            <lucide-icon [img]="icons.user" class="w-5 h-5"></lucide-icon>
          </a>
        }
      </div>

      <!-- MOBILE MENU BUTTON -->
      <app-mobile-menubar/>

    </div>

  </div>

 
</nav>
