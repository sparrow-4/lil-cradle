<div
  class="min-h-screen flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8 absolute inset-0 z-[100] register-bg">

  <!-- Background decorative blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <!-- Logo -->
    <div class="logo-ring mx-auto w-20 h-20 flex items-center justify-center rounded-full mb-2 shadow-lg">
      <img class="h-14 w-auto object-contain" src="/images/lil-c.png" alt="Lil Cradle Logo">
    </div>
    <h2 class="mt-4 text-center text-3xl font-extrabold heading-gradient">
      Create an Account
    </h2>
    <p class="mt-1 text-center text-sm text-[#8C6D4F] font-medium">
      Join Lil Cradle and start shopping
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
    <div class="glass-card py-8 px-6 sm:rounded-2xl sm:px-10">

      <!-- Error -->
      <div *ngIf="error"
        class="mb-5 flex items-center gap-2 bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl text-sm font-medium animate-shake">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
            clip-rule="evenodd" />
        </svg>
        {{ error }}
      </div>

      <!-- Success -->
      <div *ngIf="success"
        class="mb-5 flex items-center gap-2 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-xl text-sm font-medium">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
            clip-rule="evenodd" />
        </svg>
        {{ success }}
      </div>

      <form class="space-y-5" (ngSubmit)="register()">

        <!-- Full Name -->
        <div>
          <label class="block text-sm font-semibold text-[#5C3D1E] mb-1">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
            <input id="reg-name" name="name" type="text" [(ngModel)]="name" required placeholder="John Doe"
              class="field-input" />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-[#5C3D1E] mb-1">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
            </svg>
            <input id="reg-email" name="email" type="email" [(ngModel)]="email" required
              placeholder="you@example.com" class="field-input" />
          </div>
        </div>

        <!-- Phone & OTP -->
        <div>
          <label class="block text-sm font-semibold text-[#5C3D1E] mb-1">Phone Number</label>
          <div class="flex gap-2">
            <div class="input-wrapper flex-grow flex items-center !px-3">
              <select name="countryCode" [(ngModel)]="countryCode" [disabled]="otpSent"
                class="bg-transparent text-sm border-r border-[#E8D5B7] pr-2 mr-2 outline-none text-[#5C3D1E] font-bold cursor-pointer">
                <option *ngFor="let c of countryCodes" [value]="c.code">{{ c.code }}</option>
              </select>
              <input id="reg-phone" name="phone" type="tel" [(ngModel)]="phone" [disabled]="otpSent" required
                placeholder="Mobile number" class="field-input !pl-0" />
            </div>
            <button type="button" (click)="sendOtp()" [disabled]="otpLoading || isOtpVerified || !phone"
              class="px-4 rounded-xl text-xs font-bold transition-all shadow-sm flex items-center justify-center min-w-[90px]"
              [ngClass]="isOtpVerified ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-[#C49A4A] text-white hover:bg-[#A67D3D]'">
              <span *ngIf="otpLoading" class="spinner-small mr-1"></span>
              {{ isOtpVerified ? 'Verified ✓' : (otpSent ? 'Resend' : 'Send OTP') }}
            </button>
          </div>
        </div>

        <!-- OTP Input (Only shows after sending) -->
        <div *ngIf="otpSent && !isOtpVerified" class="animate-fade-in">
          <label class="block text-sm font-semibold text-[#5C3D1E] mb-1">Enter 6-digit OTP</label>
          <div class="flex gap-2">
            <div class="input-wrapper flex-grow">
              <input name="otpCode" type="text" [(ngModel)]="otpCode" maxlength="6"
                placeholder="Enter 123456" class="field-input text-center tracking-[0.5em] font-bold" />
            </div>
            <button type="button" (click)="verifyOtp()" [disabled]="otpCode.length < 6"
              class="px-6 bg-[#5C3D1E] text-white rounded-xl text-xs font-bold hover:bg-black transition-all shadow-sm">
              Verify
            </button>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-semibold text-[#5C3D1E] mb-1">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
            <input id="reg-password" name="password" [type]="showPassword ? 'text' : 'password'"
              [(ngModel)]="password" required placeholder="Min. 6 characters" class="field-input has-eye" />
            <button type="button" (click)="togglePassword()" class="eye-btn" tabindex="-1">
              <svg *ngIf="!showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showPassword" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-semibold text-[#5C3D1E] mb-1">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            <input id="reg-confirm" name="confirmPassword" [type]="showConfirm ? 'text' : 'password'"
              [(ngModel)]="confirmPassword" required placeholder="Re-enter password"
              class="field-input has-eye" />
            <button type="button" (click)="toggleConfirm()" class="eye-btn" tabindex="-1">
              <svg *ngIf="!showConfirm" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
              <svg *ngIf="showConfirm" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <div class="pt-1">
          <button type="submit" [disabled]="loading" id="reg-submit-btn"
            class="submit-btn w-full flex justify-center items-center gap-2 py-3 px-4 rounded-full text-sm font-bold text-white transition-all">
            <span *ngIf="loading" class="spinner"></span>
            <span>{{ loading ? 'Creating Account…' : 'Create Account' }}</span>
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-[#E8D5B7]"></div>
        </div>
        <div class="relative flex justify-center text-xs">
          <span class="bg-white px-3 text-[#B08050] font-medium">Already have an account?</span>
        </div>
      </div>

      <!-- Sign In Link -->
      <a routerLink="/login" id="goto-login-link"
        class="w-full flex justify-center py-2.5 px-4 border-2 border-[#C49A4A] rounded-full text-sm font-bold text-[#C49A4A] hover:bg-[#C49A4A] hover:text-white transition-all duration-200">
        Sign In Instead
      </a>

      <p class="text-center text-xs text-[#B08050] mt-6 pt-5 border-t border-[#F0E0C0] font-medium">
        <a routerLink="/" class="hover:text-[#C49A4A] transition-colors">← Back to Storefront</a>
      </p>
    </div>
  </div>
</div>
