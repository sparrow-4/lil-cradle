<div class="space-y-6">
  
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-2xl font-bold text-gray-800">Dashboard Overview</h2>
    <span class="text-sm text-gray-500 font-medium">Last 30 Days Dashboard</span>
  </div>

  <!-- Metric Cards -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
    <div *ngFor="let stat of stats" class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 flex flex-col hover:shadow-md transition">
      <span class="text-sm font-semibold text-gray-500 mb-2 uppercase tracking-wide">{{ stat.title }}</span>
      <span class="text-3xl font-extrabold text-gray-900 mb-4">{{ stat.value }}</span>
      <div class="flex items-center text-sm font-medium" [ngClass]="stat.up ? 'text-green-600' : 'text-red-500'">
        <svg *ngIf="stat.up" class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
        <svg *ngIf="!stat.up" class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"></path></svg>
        {{ stat.trend }}
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-8">
    
    <!-- Simulated Chart Area -->
    <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <h3 class="text-lg font-bold text-gray-800 mb-6">Sales Analytics (Mock)</h3>
      <div class="w-full h-64 bg-gray-50 rounded flex items-end justify-between px-4 pt-10 pb-2 border-b border-l border-gray-200 relative overflow-hidden">
        <!-- Grid lines backdrop -->
        <div class="absolute inset-0 flex flex-col justify-between pointer-events-none p-4 opacity-50">
          <div class="w-full border-b border-gray-200"></div><div class="w-full border-b border-gray-200"></div><div class="w-full border-b border-gray-200"></div><div class="w-full border-b border-gray-200"></div>
        </div>
        <!-- Bar Graph -->
        <div class="w-[8%] bg-[#0F83B2] rounded-t-sm h-[40%] hover:brightness-110 transition cursor-pointer relative z-10"></div>
        <div class="w-[8%] bg-[#0F83B2] rounded-t-sm h-[60%] hover:brightness-110 transition cursor-pointer relative z-10"></div>
        <div class="w-[8%] bg-[#0F83B2] rounded-t-sm h-[30%] hover:brightness-110 transition cursor-pointer relative z-10"></div>
        <div class="w-[8%] bg-[#0F83B2] rounded-t-sm h-[75%] hover:brightness-110 transition cursor-pointer relative z-10"></div>
        <div class="w-[8%] bg-[#0F83B2] rounded-t-sm h-[50%] hover:brightness-110 transition cursor-pointer relative z-10"></div>
        <div class="w-[8%] bg-[#0F83B2] rounded-t-sm h-[90%] hover:brightness-110 transition cursor-pointer relative z-10"></div>
        <div class="w-[8%] bg-[#0F83B2] rounded-t-sm h-[40%] hover:brightness-110 transition cursor-pointer relative z-10"></div>
      </div>
    </div>

    <!-- Recent Orders Table -->
    <div class="lg:col-span-1 bg-white rounded-xl shadow-sm border border-gray-100 p-6">
      <div class="flex justify-between items-center mb-6">
         <h3 class="text-lg font-bold text-gray-800">Recent Orders</h3>
         <button class="text-[#0F83B2] text-sm font-semibold hover:underline">View All</button>
      </div>
      
      <div class="space-y-4">
        <div *ngFor="let order of recentOrders" class="flex justify-between items-center p-3 hover:bg-gray-50 rounded-lg transition border border-transparent hover:border-gray-100">
          <div>
            <p class="font-bold text-gray-800 text-sm">{{ order.id }}</p>
            <p class="text-xs text-gray-500">{{ order.customer }} • {{ order.date }}</p>
          </div>
          <div class="text-right">
            <p class="font-bold text-gray-900 text-sm">{{ order.total }}</p>
            <span class="inline-block px-2 py-1 text-[10px] font-bold uppercase tracking-wide rounded-full mt-1"
                  [ngClass]="{
                    'bg-yellow-100 text-yellow-800': order.statusColor === 'yellow',
                    'bg-green-100 text-green-800': order.statusColor === 'green',
                    'bg-blue-100 text-blue-800': order.statusColor === 'blue',
                    'bg-red-100 text-red-800': order.statusColor === 'red'
                  }">
              {{ order.status }}
            </span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
