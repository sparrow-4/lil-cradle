<section class="max-w-[1200px] mx-auto px-4 sm:px-6 py-12 pt-28 sm:pt-32">

  <!-- ── CATEGORY FILTER ── -->
  <!-- Mobile: horizontal scrollable chips | Desktop: vertical sidebar -->
  <div class="md:hidden mb-5">
    <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
      <button (click)="activeCategory='all'"
        [class]="activeCategory==='all' ? 'bg-[#0F83B2] text-white' : 'bg-white text-gray-600 border border-gray-200'"
        class="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex-shrink-0 transition shadow-sm">
        All Products
      </button>
      <button (click)="activeCategory='featured'"
        [class]="activeCategory==='featured' ? 'bg-[#0F83B2] text-white' : 'bg-white text-gray-600 border border-gray-200'"
        class="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex-shrink-0 transition shadow-sm">
        Featured
      </button>
      <button (click)="activeCategory='best'"
        [class]="activeCategory==='best' ? 'bg-[#0F83B2] text-white' : 'bg-white text-gray-600 border border-gray-200'"
        class="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex-shrink-0 transition shadow-sm">
        Best Sellers
      </button>
      <button (click)="activeCategory='new'"
        [class]="activeCategory==='new' ? 'bg-[#0F83B2] text-white' : 'bg-white text-gray-600 border border-gray-200'"
        class="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap flex-shrink-0 transition shadow-sm">
        New Arrivals
      </button>
    </div>
  </div>

  <div class="flex flex-col md:flex-row gap-8">

    <!-- ── DESKTOP SIDEBAR (hidden on mobile) ── -->
    <aside class="hidden md:block w-64 flex-shrink-0">
      <h3 class="text-xl font-bold mb-4">Categories</h3>

      <div *ngIf="isLoading" class="space-y-3">
        <div class="h-6 w-3/4 shimmer rounded"></div>
        <div class="h-6 w-1/2 shimmer rounded"></div>
        <div class="h-6 w-2/3 shimmer rounded"></div>
        <div class="h-6 w-1/2 shimmer rounded"></div>
      </div>

      <ul *ngIf="!isLoading" class="space-y-3 text-gray-600">
        <li><button (click)="activeCategory='all'"    [class.font-bold]="activeCategory==='all'"      class="hover:text-[#0F83B2]">All Products</button></li>
        <li><button (click)="activeCategory='featured'" [class.font-bold]="activeCategory==='featured'" class="hover:text-[#0F83B2]">Featured</button></li>
        <li><button (click)="activeCategory='best'"   [class.font-bold]="activeCategory==='best'"     class="hover:text-[#0F83B2]">Best Sellers</button></li>
        <li><button (click)="activeCategory='new'"    [class.font-bold]="activeCategory==='new'"      class="hover:text-[#0F83B2]">New Arrivals</button></li>
      </ul>
    </aside>

    <!-- ── LOADING SKELETONS ── -->
    <div *ngIf="isLoading" class="w-full grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6">
      <div *ngFor="let m of [1,2,3,4,5,6]" class="bg-white rounded-xl p-3 sm:p-4 shadow-sm border border-gray-100 flex flex-col">
        <div class="w-full h-[150px] sm:h-[200px] shimmer rounded-lg mb-3"></div>
        <div class="w-3/4 h-4 shimmer rounded mb-3"></div>
        <div class="w-1/3 h-5 shimmer rounded mb-4"></div>
        <div class="w-full h-9 shimmer rounded-full mt-auto"></div>
      </div>
    </div>

    <!-- ── PRODUCT GRID ── -->
    <div *ngIf="!isLoading" class="w-full grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6">

      <div *ngFor="let p of products"
           class="bg-white rounded-xl p-3 sm:p-4 shadow-sm group border border-gray-100 relative flex flex-col">
        <!-- Image -->
        <div class="relative bg-[#f8f9fa] rounded-lg">
          <img [src]="p.image" loading="lazy" class="w-full h-[140px] sm:h-[200px] object-contain">
          <span *ngIf="p.sale" class="absolute top-2 left-2 bg-[#b89c84] text-white text-[10px] sm:text-xs px-1.5 sm:px-2 py-0.5 sm:py-1 rounded shadow">SALE</span>
        </div>

        <h3 class="font-medium text-gray-800 mt-3 text-sm sm:text-base leading-tight">{{ p.name }}</h3>
        <div class="flex items-center gap-1.5 mt-1 mb-3">
          <span class="text-[#0F83B2] font-bold text-sm sm:text-base">₹{{ p.price }}</span>
          <span *ngIf="p.oldPrice" class="text-gray-400 line-through text-xs">₹{{ p.oldPrice }}</span>
        </div>

        <button (click)="addToCart(p)"
          class="mt-auto w-full border border-[#0F83B2] text-[#0F83B2] font-medium py-1.5 sm:py-2 text-xs sm:text-sm rounded-full hover:bg-[#0F83B2] hover:text-white transition shadow-sm">
          Add to Cart
        </button>
      </div>

    </div>

  </div>
</section>
