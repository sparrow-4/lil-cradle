<section class="max-w-[1200px] mx-auto px-6 py-12 pt-32">
  <div class="flex flex-col md:flex-row gap-8">
    
    <!-- Sidebar Filters -->
    <aside class="w-full md:w-64 flex-shrink-0">
      <h3 class="text-xl font-bold mb-4">Categories</h3>
      
      <div *ngIf="isLoading" class="space-y-3">
        <div class="h-6 w-3/4 shimmer rounded"></div>
        <div class="h-6 w-1/2 shimmer rounded"></div>
        <div class="h-6 w-2/3 shimmer rounded"></div>
        <div class="h-6 w-1/2 shimmer rounded"></div>
      </div>

      <ul *ngIf="!isLoading" class="space-y-3 text-gray-600">
        <li><button (click)="activeCategory='all'" [class.font-bold]="activeCategory==='all'" class="hover:text-[#0F83B2]">All Products</button></li>
        <li><button (click)="activeCategory='featured'" [class.font-bold]="activeCategory==='featured'" class="hover:text-[#0F83B2]">Featured</button></li>
        <li><button (click)="activeCategory='best'" [class.font-bold]="activeCategory==='best'" class="hover:text-[#0F83B2]">Best Sellers</button></li>
        <li><button (click)="activeCategory='new'" [class.font-bold]="activeCategory==='new'" class="hover:text-[#0F83B2]">New Arrivals</button></li>
      </ul>
    </aside>

    <!-- Loading Skeletons -->
    <div *ngIf="isLoading" class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let m of [1,2,3,4,5,6]" class="bg-white rounded-xl p-4 shadow-sm group border border-gray-100 flex flex-col">
         <div class="w-full h-[200px] shimmer rounded-lg mb-4"></div>
         <div class="w-3/4 h-5 shimmer rounded mb-4 mt-2"></div>
         <div class="w-1/3 h-6 shimmer rounded mb-5"></div>
         <div class="w-full h-10 shimmer rounded-full mt-auto"></div>
      </div>
    </div>

    <!-- Product Grid -->
    <div *ngIf="!isLoading" class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      
      <!-- Card -->
      <div *ngFor="let p of products" class="bg-white rounded-xl p-4 shadow-sm group border border-gray-100 relative">
        <div class="relative bg-[#f8f9fa] rounded-lg">
          <img [src]="p.image" loading="lazy" class="w-full h-[200px] object-contain">
          <span *ngIf="p.sale" class="absolute top-2 left-2 bg-[#b89c84] text-white text-xs px-2 py-1 rounded shadow">SALE</span>
        </div>
        
        <h3 class="font-medium text-gray-800 mt-4">{{ p.name }}</h3>
        <div class="flex items-center gap-2 mt-1 mb-4">
          <span class="text-[#0F83B2] font-bold">${{ p.price }}</span>
          <span *ngIf="p.oldPrice" class="text-gray-400 line-through text-xs">${{ p.oldPrice }}</span>
        </div>
        
        <button (click)="addToCart(p)" class="w-full border border-[#0F83B2] text-[#0F83B2] font-medium py-2 rounded-full hover:bg-[#0F83B2] hover:text-white transition shadow-sm">
          Add to Cart
        </button>
      </div>

    </div>
  </div>
</section>
