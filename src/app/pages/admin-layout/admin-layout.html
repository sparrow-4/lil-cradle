<!-- Permanent Admin Shell overlaid absolute z-max to block normal header/footer visually if routed here -->
<div class="h-screen w-full flex bg-gray-100 overflow-hidden absolute inset-0 z-[100]">

  <!-- Sidebar -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shrink-0">
    <!-- Brand -->
    <div class="h-20 flex items-center px-6 border-b border-gray-800">
      <img src="images/lil-c.png" class="h-8 mr-3 brightness-0 invert opacity-90">
      <span class="font-bold tracking-wider text-sm">ADMIN PANEL</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-4 space-y-2 overflow-y-auto">
      <a routerLink="/admin/dashboard" routerLinkActive="bg-gray-800 text-white" [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition group">
        Dashboard Overview
      </a>
      
      <a routerLink="/admin/dashboard/reports" routerLinkActive="bg-gray-800 text-white"
         class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition group">
         Order & Sales Reports
      </a>

      <a routerLink="/admin/dashboard/settings" routerLinkActive="bg-gray-800 text-white"
         class="flex items-center px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition group">
        Site Settings & Text
      </a>
    </nav>

    <!-- Bottom Actions -->
    <div class="p-4 border-t border-gray-800">
      <button (click)="logout()" class="w-full flex items-center justify-center px-4 py-2 bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white rounded-lg transition text-sm font-medium">
        Sign Out
      </button>
      <a routerLink="/" class="mt-2 w-full flex items-center justify-center px-4 py-2 text-gray-400 hover:text-white transition text-xs">
        Return to Store
      </a>
    </div>
  </aside>

  <!-- Main Content Area -->
  <main class="flex-1 h-full overflow-y-auto flex flex-col">
    <!-- Top Header -->
    <header class="h-20 bg-white border-b border-gray-200 flex items-center justify-between px-8 shrink-0 shadow-sm z-10 w-full">
      <h1 class="text-xl font-bold text-gray-800 tracking-tight">Lil Cradle HQ</h1>
      <div class="flex items-center gap-4">
        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        <span class="text-sm font-medium text-gray-600">System Online</span>
        <div class="w-10 h-10 ml-4 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold border-2 border-white shadow-sm">A</div>
      </div>
    </header>

    <!-- Dynamic Content Injection for Sub-pages -->
    <div class="p-8 w-full max-w-[1400px] mx-auto min-h-full">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
