<!-- Admin Shell -->
<div class="h-screen w-full flex bg-gray-100 overflow-hidden absolute inset-0 z-[100]">

  <!-- ── MOBILE BACKDROP ── -->
  <div *ngIf="sidebarOpen"
       (click)="toggleSidebar()"
       class="fixed inset-0 bg-black/50 z-40 lg:hidden">
  </div>

  <!-- ── SIDEBAR ── -->
  <aside
    class="fixed lg:static top-0 left-0 h-full w-64 bg-gray-900 text-white flex flex-col z-50
           transform transition-transform duration-300 ease-in-out lg:translate-x-0 shrink-0"
    [class.-translate-x-full]="!sidebarOpen"
    [class.translate-x-0]="sidebarOpen">

    <!-- Brand -->
    <div class="h-16 lg:h-20 flex items-center px-5 border-b border-gray-800">
      <img src="images/lil-c.png" class="h-7 mr-3 brightness-0 invert opacity-90">
      <span class="font-bold tracking-wider text-sm">ADMIN PANEL</span>
      <!-- Close btn (mobile only) -->
      <button (click)="toggleSidebar()" class="ml-auto lg:hidden text-gray-400 hover:text-white p-1">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-5 px-3 space-y-1 overflow-y-auto">
      <a routerLink="/admin/dashboard" (click)="sidebarOpen=false"
         routerLinkActive="bg-gray-800 text-white" [routerLinkActiveOptions]="{exact: true}"
         class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard Overview
      </a>

      <a routerLink="/admin/dashboard/orders" (click)="sidebarOpen=false"
         routerLinkActive="bg-gray-800 text-white"
         class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        Orders &amp; Fulfillment
      </a>

      <a routerLink="/admin/dashboard/products" (click)="sidebarOpen=false"
         routerLinkActive="bg-gray-800 text-white"
         class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        Product Management
      </a>

      <a routerLink="/admin/dashboard/messages" (click)="sidebarOpen=false"
         routerLinkActive="bg-gray-800 text-white"
         class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
        Customer Messages
      </a>

      <a routerLink="/admin/dashboard/reviews" (click)="sidebarOpen=false"
         routerLinkActive="bg-gray-800 text-white"
         class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
        </svg>
        Product Reviews
      </a>

      <a routerLink="/admin/dashboard/settings" (click)="sidebarOpen=false"
         routerLinkActive="bg-gray-800 text-white"
         class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0"/>
        </svg>
        Site Settings &amp; Text
      </a>

      <a routerLink="/admin/dashboard/profile" (click)="sidebarOpen=false"
         routerLinkActive="bg-gray-800 text-white"
         class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg transition text-sm">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Admin Profile
      </a>
    </nav>

    <!-- Bottom Actions -->
    <div class="p-4 border-t border-gray-800 space-y-2">
      <button (click)="logout()"
        class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white rounded-lg transition text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </button>
      <a routerLink="/" (click)="sidebarOpen=false"
        class="w-full flex items-center justify-center px-4 py-2 text-gray-400 hover:text-white transition text-xs">
        ← Return to Store
      </a>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="flex-1 h-full overflow-y-auto flex flex-col min-w-0">

    <!-- Top Header -->
    <header class="h-14 lg:h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 lg:px-8 shrink-0 shadow-sm z-10 w-full">
      <!-- Hamburger (mobile only) -->
      <button (click)="toggleSidebar()" class="lg:hidden mr-3 text-gray-600 hover:text-gray-900 p-1">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <h1 class="text-base lg:text-xl font-bold text-gray-800 tracking-tight">Lil Cradle HQ</h1>
      <div class="flex items-center gap-2 lg:gap-4 ml-auto">
        <span class="hidden sm:flex items-center gap-1.5 text-xs lg:text-sm font-medium text-gray-600">
          <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
          System Online
        </span>
        <a routerLink="/admin/dashboard/profile" class="w-8 h-8 lg:w-10 lg:h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-700 font-bold border-2 border-white shadow-sm text-sm hover:scale-105 transition-transform">
          {{ (auth.currentUser()?.name || 'A')[0].toUpperCase() }}
        </a>
      </div>
    </header>

    <!-- Dynamic Content -->
    <div class="p-4 lg:p-8 w-full max-w-[1400px] mx-auto min-h-full">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
