<div class="space-y-6 max-w-6xl mx-auto">
  <div class="flex items-center justify-between mb-8">
    <h2 class="text-2xl font-bold text-gray-800">Product Matrix</h2>
    <span class="text-sm text-gray-500 font-medium">Any changes sync instantly with storefront</span>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    
    <!-- Table Header -->
    <div class="grid grid-cols-12 gap-4 p-4 border-b border-gray-200 bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wide">
      <div class="col-span-1">Img</div>
      <div class="col-span-4">Product Catalog Name</div>
      <div class="col-span-2">Base Price ($)</div>
      <div class="col-span-2">Old Price ($)</div>
      <div class="col-span-2">Toggle Sale</div>
      <div class="col-span-1 text-center">Type</div>
    </div>

    <!-- Table Rows -->
    <div class="divide-y divide-gray-100">
      <div *ngFor="let product of products" class="grid grid-cols-12 gap-4 p-4 items-center hover:bg-slate-50 transition">
        
        <div class="col-span-1">
           <img [src]="product.image" class="w-10 h-10 object-cover rounded-md border border-gray-200">
        </div>
        
        <div class="col-span-4 pr-4">
           <input type="text" [(ngModel)]="product.name" class="w-full px-2 py-1 text-sm font-bold text-gray-800 border border-transparent hover:border-gray-300 focus:border-[#0F83B2] focus:ring-0 rounded bg-transparent focus:bg-white transition outline-none">
        </div>

        <div class="col-span-2 pr-4 relative">
          <span class="absolute left-2 top-1.5 text-gray-400 font-bold">$</span>
          <input type="number" [(ngModel)]="product.price" class="w-full pl-6 pr-2 py-1 text-sm font-bold text-gray-900 border border-transparent hover:border-gray-300 focus:border-green-500 focus:ring-0 rounded bg-transparent focus:bg-white transition outline-none">
        </div>

        <div class="col-span-2 pr-4 relative">
          <span class="absolute left-2 top-1.5 text-gray-400 font-medium">$</span>
          <input type="number" [(ngModel)]="product.oldPrice" class="w-full pl-6 pr-2 py-1 text-sm text-gray-500 border border-transparent hover:border-gray-300 focus:border-gray-400 focus:ring-0 rounded bg-transparent focus:bg-white transition outline-none" placeholder="None">
        </div>

        <div class="col-span-2 flex items-center">
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" [(ngModel)]="product.sale" class="sr-only peer">
            <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-500"></div>
            <span class="ml-3 text-xs font-bold text-gray-600" [class.text-red-500]="product.sale">{{ product.sale ? 'ON SALE' : 'Normal' }}</span>
          </label>
        </div>

        <div class="col-span-1 text-center text-xs font-bold uppercase text-gray-400">
           {{ product.type }}
        </div>
        
      </div>
    </div>

  </div>
</div>
