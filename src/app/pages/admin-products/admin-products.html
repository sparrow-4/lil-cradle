<div class="space-y-6">
  <div class="flex flex-wrap items-center justify-between gap-2 mb-6">
    <h2 class="text-xl lg:text-2xl font-bold text-gray-800">Product Matrix</h2>
    <div class="flex gap-2">
      <button (click)="addProduct()" class="px-4 py-2 bg-green-500 text-white text-sm font-bold rounded-lg hover:bg-green-600 transition">
        + Add Product
      </button>
      <button (click)="saveAll()" class="px-4 py-2 bg-[#0F83B2] text-white text-sm font-bold rounded-lg hover:opacity-90 transition">
        Save All Changes
      </button>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

    <!-- ── DESKTOP TABLE (md+) ── -->
    <div class="hidden md:block overflow-x-auto">
      <div class="grid grid-cols-12 gap-3 p-4 border-b border-gray-200 bg-gray-50 text-xs font-bold text-gray-500 uppercase tracking-wide min-w-[640px]">
        <div class="col-span-1">Img</div>
        <div class="col-span-4">Product Name</div>
        <div class="col-span-2">Price (₹)</div>
        <div class="col-span-2">Old Price (₹)</div>
        <div class="col-span-2">Sale</div>
        <div class="col-span-1 text-center">Type</div>
      </div>
      <div class="divide-y divide-gray-100 min-w-[640px]">
        <div *ngFor="let product of products"
             class="grid grid-cols-12 gap-3 p-4 items-center hover:bg-slate-50 transition">
          <div class="col-span-1 relative group cursor-pointer border border-gray-200 rounded-md overflow-hidden">
            <input type="file" (change)="uploadImage($event, product)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" title="Click to replace image">
            <img [src]="product.image" class="w-10 h-10 object-cover w-full scale-110 group-hover:blur-sm transition">
            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/30 pointer-events-none">
              <span class="text-white text-[10px] font-bold">Replace</span>
            </div>
          </div>
          <div class="col-span-4 pr-2">
            <input type="text" [(ngModel)]="product.name"
              class="w-full px-2 py-1 text-sm font-bold text-gray-800 border border-transparent hover:border-gray-300 focus:border-[#0F83B2] rounded bg-transparent focus:bg-white transition outline-none">
          </div>
          <div class="col-span-2 pr-2 relative">
            <span class="absolute left-2 top-1.5 text-gray-400 font-bold text-sm">₹</span>
            <input type="number" [(ngModel)]="product.price"
              class="w-full pl-5 pr-2 py-1 text-sm font-bold text-gray-900 border border-transparent hover:border-gray-300 focus:border-green-500 rounded bg-transparent focus:bg-white transition outline-none">
          </div>
          <div class="col-span-2 pr-2 relative">
            <span class="absolute left-2 top-1.5 text-gray-400 font-medium text-sm">₹</span>
            <input type="number" [(ngModel)]="product.oldPrice" placeholder="None"
              class="w-full pl-5 pr-2 py-1 text-sm text-gray-500 border border-transparent hover:border-gray-300 focus:border-gray-400 rounded bg-transparent focus:bg-white transition outline-none">
          </div>
          <div class="col-span-2 flex items-center justify-between">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" [(ngModel)]="product.sale" class="sr-only peer">
              <div class="w-9 h-5 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-500"></div>
            </label>
            <button (click)="deleteProduct(product._id)" class="text-red-500 text-xs font-bold hover:underline">Delete</button>
          </div>
          <div class="col-span-1 text-center text-xs font-bold uppercase text-gray-400">
             <select [(ngModel)]="product.type" class="bg-transparent border-b border-gray-300 px-1 py-1 text-xs">
                <option value="featured">Featured</option>
                <option value="best">Best Seller</option>
                <option value="new">New Arrival</option>
             </select>
          </div>
        </div>
      </div>
    </div>

    <!-- ── MOBILE CARDS ── -->
    <div class="md:hidden divide-y divide-gray-100">
      <div *ngFor="let product of products" class="p-4 space-y-3">
        <!-- Image + Name -->
        <div class="flex items-center gap-3">
          <img [src]="product.image" class="w-14 h-14 object-cover rounded-lg border border-gray-200 shrink-0">
          <div class="flex-1 min-w-0">
            <input type="text" [(ngModel)]="product.name"
              class="w-full px-2 py-1 text-sm font-bold text-gray-800 border border-gray-200 focus:border-[#0F83B2] rounded bg-white outline-none">
            <p class="text-xs text-gray-400 mt-1 uppercase font-semibold">{{ product.type }}</p>
          </div>
        </div>
        <!-- Prices -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-xs text-gray-500 font-semibold block mb-1">Price (₹)</label>
            <div class="relative">
              <span class="absolute left-2 top-2 text-gray-400 font-bold text-sm">₹</span>
              <input type="number" [(ngModel)]="product.price"
                class="w-full pl-5 pr-2 py-1.5 text-sm font-bold text-gray-900 border border-gray-200 focus:border-green-500 rounded outline-none">
            </div>
          </div>
          <div>
            <label class="text-xs text-gray-500 font-semibold block mb-1">Old Price (₹)</label>
            <div class="relative">
              <span class="absolute left-2 top-2 text-gray-400 text-sm">₹</span>
              <input type="number" [(ngModel)]="product.oldPrice" placeholder="None"
                class="w-full pl-5 pr-2 py-1.5 text-sm text-gray-500 border border-gray-200 focus:border-gray-400 rounded outline-none">
            </div>
          </div>
        </div>
        <!-- Sale toggle -->
        <div class="flex items-center justify-between">
          <span class="text-xs text-gray-500 font-semibold">On Sale?</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" [(ngModel)]="product.sale" class="sr-only peer">
            <div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-red-500"></div>
          </label>
        </div>
        <div class="flex items-center justify-end mt-2">
           <button (click)="deleteProduct(product._id)" class="text-red-500 text-xs font-bold hover:underline shrink-0">Delete Product</button>
        </div>
      </div>
    </div>

  </div>
</div>
