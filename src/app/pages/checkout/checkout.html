<section class="max-w-[1000px] mx-auto px-6 py-12 pt-32 min-h-[60vh]">
  <h2 class="text-3xl font-bold mb-8 text-[#0F83B2]">Checkout</h2>

  <div *ngIf="isLoading" class="flex flex-col lg:flex-row gap-10">
    <div class="flex-1 bg-white p-8 rounded-xl shadow-sm border border-gray-100 space-y-6">
       <div class="h-6 w-1/3 shimmer rounded mb-6"></div>
       <div class="space-y-4">
          <div class="h-14 w-full shimmer rounded-lg"></div>
          <div class="h-14 w-full shimmer rounded-lg"></div>
          <div class="h-14 w-full shimmer rounded-lg"></div>
          <div class="h-14 w-full shimmer rounded-lg"></div>
       </div>
    </div>
    <div class="w-full lg:w-[360px] shimmer rounded-xl h-[350px]"></div>
  </div>

  <div *ngIf="!isLoading" class="flex flex-col lg:flex-row gap-10">
    
    <!-- Delivery Form -->
    <div class="flex-1 bg-white p-8 rounded-xl shadow-sm border border-gray-100">
      <h3 class="text-xl font-bold mb-6 border-b pb-3">Delivery Information</h3>
      
      <form class="space-y-4">
        <div>
          <label class="block text-sm text-gray-600 mb-1">Full Name *</label>
          <input type="text" [(ngModel)]="customer.name" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-[#0F83B2]" required>
        </div>
        
        <div>
          <label class="block text-sm text-gray-600 mb-1">Phone Number (WhatsApp) *</label>
          <input type="tel" [(ngModel)]="customer.phone" name="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-[#0F83B2]" required>
        </div>

        <div>
          <label class="block text-sm text-gray-600 mb-1">Street Address *</label>
          <input type="text" [(ngModel)]="customer.address" name="address" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-[#0F83B2]" required>
        </div>
        
        <div>
          <label class="block text-sm text-gray-600 mb-1">City *</label>
          <input type="text" [(ngModel)]="customer.city" name="city" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-[#0F83B2]" required>
        </div>
      </form>
    </div>

    <!-- Order Summary -->
    <div class="w-full lg:w-[360px] bg-[#EAF6FB] rounded-xl p-8 h-fit">
      <h3 class="text-xl font-bold mb-6 text-gray-800 border-b border-[#0F83B2]/20 pb-3">Your Order</h3>
      
      <div class="space-y-3 mb-6">
        <div *ngFor="let item of cart.items()" class="flex justify-between text-sm">
          <span>{{ item.qty }}x {{ item.name }}</span>
          <span class="font-medium">${{ item.price * item.qty }}</span>
        </div>
      </div>
      
      <div class="flex justify-between font-bold text-xl border-t border-[#0F83B2]/20 pt-4 mb-8 text-[#0F83B2]">
        <span>Total</span>
        <span>${{ cart.total() }}</span>
      </div>
      
      <button (click)="placeOrder()" class="w-full bg-[#25D366] text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-opacity-90 transition shadow-md">
        <svg fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
51:         Pay via WhatsApp
52:       </button>
53:       <p class="text-xs text-center mt-3 text-gray-500">You will be redirected to WhatsApp to confirm and coordinate payment securely with our staff.</p>
54:     </div>
55: 
56:   </div>
</section>
