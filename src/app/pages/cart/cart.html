<section class="max-w-[1000px] mx-auto px-6 py-12 pt-32 min-h-[60vh]">
  <h2 class="text-3xl font-bold mb-8 text-[#0F83B2]">Shopping Cart</h2>

  <!-- Empty state -->
  <div *ngIf="cart.items().length === 0" class="text-center py-16 bg-[#EAF6FB] rounded-xl">
    <p class="text-gray-600 mb-4">Your cart is currently empty.</p>
    <a routerLink="/shop" class="bg-[#0F83B2] text-white px-6 py-2 rounded-full font-medium inline-block hover:shadow-lg transition">Continue Shopping</a>
  </div>

  <!-- Cart with items -->
  <div *ngIf="cart.items().length > 0" class="flex flex-col md:flex-row gap-10">
    <div class="flex-1 space-y-4">
      
      <!-- Cart Item -->
      <div *ngFor="let item of cart.items()" class="flex flex-col sm:flex-row items-center gap-4 bg-white p-4 rounded-xl border border-gray-100 shadow-sm relative">
        <img [src]="item.image" class="w-20 h-20 bg-gray-50 rounded-lg object-contain">
        
        <div class="flex-1 text-center sm:text-left">
          <h4 class="font-bold text-gray-800">{{ item.name }}</h4>
          <p class="text-[#0F83B2] font-semibold">${{ item.price }}</p>
        </div>

        <div class="flex items-center gap-3 mt-4 sm:mt-0">
          <button (click)="updateQty(item, -1)" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold pb-1 hover:bg-[#b89c84] hover:text-white transition">-</button>
          <span class="font-medium inline-block w-4 text-center">{{ item.qty }}</span>
          <button (click)="updateQty(item, 1)" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold pb-1 hover:bg-[#0F83B2] hover:text-white transition">+</button>
        </div>

        <button (click)="remove(item.id)" class="absolute top-2 right-4 sm:static text-red-400 hover:text-red-600 pl-4 font-bold text-lg">×</button>
      </div>

    </div>

    <!-- Summary box -->
    <div class="w-full md:w-[300px] bg-white rounded-xl shadow-sm border border-gray-100 p-6 h-fit">
      <h3 class="text-xl font-bold mb-4 border-b pb-4">Order Summary</h3>
      <div class="flex justify-between mb-2 text-gray-600">
        <span>Subtotal</span>
        <span>${{ cart.total() }}</span>
      </div>
      <div class="flex justify-between mb-4 text-gray-600">
        <span>Shipping</span>
        <span>Free</span>
      </div>
      <div class="flex justify-between font-bold text-xl border-t pt-4 mb-6">
        <span>Total</span>
        <span class="text-[#0F83B2]">${{ cart.total() }}</span>
      </div>
      <a routerLink="/checkout" class="w-full bg-[#0F83B2] text-white py-3 rounded-full font-bold block text-center hover:bg-opacity-90 transition shadow-md">
        Proceed to Checkout
      </a>
    </div>
  </div>
</section>
