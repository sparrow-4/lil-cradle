<section class="w-full py-16 bg-white flex justify-center">

  <div class="w-full max-w-[1200px] text-center px-4">

    <!-- HEADING -->
    <h2 class="text-2xl md:text-3xl font-semibold text-gray-800 mb-2">
      Find the Perfect Toy
    </h2>

    <p class="text-gray-500 mb-12">
      Our Collections
    </p>

    <!-- CATEGORY GRID -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-8">

      <!-- CARD FORMATS - Loop dynamically -->
      <a *ngFor="let cat of categories" [routerLink]="cat.link" class="flex flex-col items-center gap-3 cursor-pointer group">
        <!-- Circle -->
        <div class="w-[100px] h-[100px] md:w-[130px] md:h-[130px] rounded-full flex items-center justify-center p-3 transition duration-300 relative group-hover:scale-105"
             style="background: linear-gradient(180deg, #EAF6FB 0%, rgba(234, 246, 251, 0) 100%);">
          <img [src]="api.getImageUrl(cat.image)" [alt]="cat.name" class="w-[85%] h-[85%] object-contain scale-x-[-1]">
        </div>
        <!-- Title -->
        <h4 class="text-gray-700 font-bold group-hover:text-[#0F83B2] transition">{{ cat.name }}</h4>
      </a>

    </div>

  </div>

</section>
