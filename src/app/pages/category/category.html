<section class="w-full py-16 bg-white flex justify-center">

  <div class="w-full max-w-[1200px] text-center px-4">

    <!-- HEADING -->
    <h2 class="text-2xl md:text-3xl font-semibold text-gray-800 mb-2">
      Find the Perfect Toy
    </h2>

    <p class="text-gray-500 mb-12">
      Our Collections
    </p>

    <!-- CATEGORY GRID -->
    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-8">

      <!-- LOOP -->
      <div 
        *ngFor="let item of categories"
        class="flex flex-col items-center group cursor-pointer"
      >

        <div class="w-24 h-24 bg-[#EAF6FB] rounded-full flex items-center justify-center transition group-hover:scale-110">
          <img [src]="item.image" class="w-12 h-12 object-contain">
        </div>

        <p class="mt-4 text-gray-700 text-sm font-medium group-hover:text-[#0F83B2]">
          {{ item.name }}
        </p>

      </div>

    </div>

  </div>

</section>
