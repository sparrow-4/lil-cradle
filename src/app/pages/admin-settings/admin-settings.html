<div class="p-6 lg:p-8">
  <header class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-serif text-[#3D2B1F] mb-2">Site Content & Settings</h1>
      <p class="text-[#8E6E37]">Customize banners, categories, and core store information</p>
    </div>
    <button (click)="saveChanges()" class="px-8 py-3 bg-[#3D2B1F] text-white font-medium rounded-xl hover:bg-[#1A120B] transition-all shadow-lg shadow-[#3D2B1F]/20 flex items-center gap-2">
      <span class="material-icons text-sm">save</span>
      Save All Changes
    </button>
  </header>

  <div class="space-y-12 max-w-5xl">
    
    <!-- Hero Banners Section -->
    <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-[#F5E6D3]">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h2 class="text-2xl font-serif text-[#3D2B1F]">Hero Banners</h2>
          <p class="text-sm text-gray-400">Manage the main carousel on the homepage</p>
        </div>
        <button (click)="addBanner()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-[#C5A059]/10 text-[#C5A059] font-medium hover:bg-[#C5A059]/20 transition-all">
          <span class="material-icons text-sm">add</span>
          Add Banner
        </button>
      </div>

      <div class="space-y-8">
        <div *ngFor="let banner of banners; let i = index" class="group relative bg-[#FDFCFB] rounded-[2rem] p-6 border border-[#F5E6D3] hover:border-[#C5A059]/50 transition-all">
          <!-- Delete Action -->
          <button (click)="removeBanner(i)" class="absolute -top-3 -right-3 w-10 h-10 rounded-full bg-white border border-red-100 text-red-500 flex items-center justify-center shadow-md hover:bg-red-50 transition-colors z-20">
            <span class="material-icons text-sm">delete</span>
          </button>

          <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Image Preview & Upload -->
            <div class="relative group/img aspect-[16/9] lg:aspect-auto rounded-2xl overflow-hidden border border-[#F5E6D3] bg-white">
              <input type="file" (change)="uploadImage($event, 'banner', i)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
              <img [src]="banner.image" class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-black/40 opacity-0 group-hover/img:opacity-100 flex flex-col items-center justify-center text-white transition-opacity">
                <span class="material-icons mb-2">cloud_upload</span>
                <span class="text-xs font-bold uppercase tracking-widest">Replace Image</span>
              </div>
            </div>

            <!-- Fields -->
            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="md:col-span-2">
                <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-2">Banner Headline</label>
                <input type="text" [(ngModel)]="banner.headline" class="w-full px-4 py-3 rounded-xl border border-[#F5E6D3] bg-white text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all font-serif text-lg">
              </div>
              
              <div>
                <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-2">Tagline</label>
                <input type="text" [(ngModel)]="banner.tagline" class="w-full px-4 py-3 rounded-xl border border-[#F5E6D3] bg-white text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all text-sm">
              </div>

              <div>
                <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-2">Background Color</label>
                <div class="flex items-center gap-3">
                  <input type="color" [(ngModel)]="banner.bgColor" class="w-12 h-12 rounded-lg border border-[#F5E6D3] bg-white cursor-pointer">
                  <input type="text" [(ngModel)]="banner.bgColor" class="flex-1 px-4 py-3 rounded-xl border border-[#F5E6D3] bg-white text-[#3D2B1F] focus:outline-none text-sm uppercase">
                </div>
              </div>

              <div>
                <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-2">Button Text</label>
                <input type="text" [(ngModel)]="banner.buttonText" class="w-full px-4 py-3 rounded-xl border border-[#F5E6D3] bg-white text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all text-sm">
              </div>

              <div>
                <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-2">Button Link</label>
                <input type="text" [(ngModel)]="banner.buttonLink" class="w-full px-4 py-3 rounded-xl border border-[#F5E6D3] bg-white text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all text-sm">
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Categories Section -->
    <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-[#F5E6D3]">
      <div class="flex items-center justify-between mb-8">
        <div>
          <h2 class="text-2xl font-serif text-[#3D2B1F]">Browse Categories</h2>
          <p class="text-sm text-gray-400">Featured categories on the homepage</p>
        </div>
        <button (click)="addCategory()" class="flex items-center gap-2 px-4 py-2 rounded-xl bg-[#C5A059]/10 text-[#C5A059] font-medium hover:bg-[#C5A059]/20 transition-all">
          <span class="material-icons text-sm">add</span>
          Add Category
        </button>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div *ngFor="let cat of categories; let i = index" class="relative group bg-[#FDFCFB] rounded-[2rem] p-5 border border-[#F5E6D3] hover:border-[#C5A059]/50 transition-all">
          <button (click)="removeCategory(i)" class="absolute -top-2 -right-2 w-8 h-8 rounded-full bg-white border border-red-100 text-red-500 flex items-center justify-center shadow-sm hover:bg-red-50 transition-colors z-20">
            <span class="material-icons text-xs">close</span>
          </button>
          
          <div class="flex flex-col items-center text-center gap-4">
            <div class="w-24 h-24 rounded-full overflow-hidden border-2 border-white shadow-md relative group/catimg">
              <input type="file" (change)="uploadImage($event, 'category', i)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
              <img [src]="cat.image" class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-[#C5A059]/60 opacity-0 group-hover/catimg:opacity-100 flex items-center justify-center text-white transition-opacity">
                <span class="material-icons text-sm">edit</span>
              </div>
            </div>
            
            <div class="w-full space-y-3">
              <input type="text" [(ngModel)]="cat.name" placeholder="Category Name" class="w-full text-center bg-transparent border-b border-transparent focus:border-[#C5A059] focus:outline-none font-serif text-[#3D2B1F] px-2 py-1">
              <input type="text" [(ngModel)]="cat.link" placeholder="Link (e.g. /shop)" class="w-full text-center bg-transparent border-b border-transparent focus:border-[#C5A059] focus:outline-none text-[10px] text-gray-400 uppercase tracking-widest px-2 py-1">
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Store Info Section -->
    <section class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-[#F5E6D3]">
      <h2 class="text-2xl font-serif text-[#3D2B1F] mb-8 border-b border-[#F5E6D3] pb-4">Store Identity & Contact</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-3">Store Name</label>
          <input type="text" [(ngModel)]="info.name" class="w-full px-5 py-4 rounded-2xl border border-[#F5E6D3] bg-[#FDFCFB] text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all">
        </div>

        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-3">WhatsApp Order Line</label>
          <div class="relative">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-[#8E6E37] font-bold">+</span>
            <input type="text" [(ngModel)]="info.whatsapp" class="w-full pl-10 pr-5 py-4 rounded-2xl border border-[#F5E6D3] bg-[#FDFCFB] text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all">
          </div>
        </div>

        <div class="md:col-span-2">
          <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-3">Store Description (Footer)</label>
          <textarea [(ngModel)]="info.description" rows="4" class="w-full px-5 py-4 rounded-2xl border border-[#F5E6D3] bg-[#FDFCFB] text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all resize-none"></textarea>
        </div>

        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-3">Contact Email</label>
          <input type="email" [(ngModel)]="info.email" class="w-full px-5 py-4 rounded-2xl border border-[#F5E6D3] bg-[#FDFCFB] text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all">
        </div>

        <div>
          <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-3">Store Phone</label>
          <input type="text" [(ngModel)]="info.phone" class="w-full px-5 py-4 rounded-2xl border border-[#F5E6D3] bg-[#FDFCFB] text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all">
        </div>

        <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8">
          <div>
            <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-3">Operating Hours (Line 1)</label>
            <input type="text" [(ngModel)]="info.hoursLine1" class="w-full px-5 py-4 rounded-2xl border border-[#F5E6D3] bg-[#FDFCFB] text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all">
          </div>
          <div>
            <label class="block text-[10px] uppercase tracking-widest text-[#8E6E37] font-bold mb-3">Operating Hours (Line 2)</label>
            <input type="text" [(ngModel)]="info.hoursLine2" class="w-full px-5 py-4 rounded-2xl border border-[#F5E6D3] bg-[#FDFCFB] text-[#3D2B1F] focus:outline-none focus:ring-2 focus:ring-[#C5A059]/20 transition-all">
          </div>
        </div>
      </div>
    </section>

    <!-- Save Button Floating (Mobile) -->
    <div class="md:hidden sticky bottom-6 left-0 right-0 z-50">
      <button (click)="saveChanges()" class="w-full py-4 bg-[#3D2B1F] text-white font-bold rounded-2xl shadow-xl">
        Save All Changes
      </button>
    </div>

  </div>
</div>
