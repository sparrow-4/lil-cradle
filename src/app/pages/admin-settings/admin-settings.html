<div class="space-y-6 max-w-4xl">

  <div class="flex flex-wrap items-center justify-between gap-2 mb-6">
    <h2 class="text-xl lg:text-2xl font-bold text-gray-800">Site Settings</h2>
    <span class="text-xs lg:text-sm text-gray-500 font-medium">Manage public content dynamically</span>
  </div>

  <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-8">
    
    <form (ngSubmit)="saveChanges()" class="space-y-8">

      <!-- Hero Banners -->
      <div>
        <h3 class="text-lg font-bold text-gray-900 border-b pb-2 mb-4">Hero Banners</h3>
        <div class="grid grid-cols-1 gap-6">
          <div *ngFor="let bg of banners; let i = index" class="border p-4 rounded-lg flex flex-col md:flex-row gap-4 bg-gray-50">
            <!-- Image Edit -->
            <div class="w-full md:w-1/3 relative group cursor-pointer border border-gray-300 rounded-lg overflow-hidden flex-shrink-0 h-40 bg-gray-200">
               <input type="file" (change)="uploadImage($event, 'banner', i)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" title="Click to replace image">
               <img *ngIf="bg.image" [src]="bg.image" class="w-full h-full object-cover">
               <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/50 pointer-events-none transition text-white font-bold text-sm">
                 Change Image
               </div>
            </div>
            <!-- Text Edit -->
            <div class="w-full md:w-2/3 grid grid-cols-1 sm:grid-cols-2 gap-4">
               <div>
                 <label class="block text-xs font-bold text-gray-700 mb-1">Tagline</label>
                 <input type="text" [(ngModel)]="bg.tagline" [name]="'tagline'+i" class="w-full px-3 py-2 text-sm border border-gray-300 rounded focus:ring-[#0F83B2] focus:border-[#0F83B2]">
               </div>
               <div>
                 <label class="block text-xs font-bold text-gray-700 mb-1">Headline (HTML OK)</label>
                 <input type="text" [(ngModel)]="bg.headline" [name]="'headline'+i" class="w-full px-3 py-2 text-sm border border-gray-300 rounded focus:ring-[#0F83B2] focus:border-[#0F83B2]">
               </div>
               <div>
                 <label class="block text-xs font-bold text-gray-700 mb-1">Button Text</label>
                 <input type="text" [(ngModel)]="bg.buttonText" [name]="'btn'+i" class="w-full px-3 py-2 text-sm border border-gray-300 rounded focus:ring-[#0F83B2] focus:border-[#0F83B2]">
               </div>
               <div>
                 <label class="block text-xs font-bold text-gray-700 mb-1">Background Color</label>
                 <input type="color" [(ngModel)]="bg.bgColor" [name]="'bg'+i" class="w-full h-9 border border-gray-300 rounded cursor-pointer">
               </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Categories -->
      <div>
        <h3 class="text-lg font-bold text-gray-900 border-b pb-2 mb-4">Categories</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          <div *ngFor="let cat of categories; let i = index" class="border p-4 rounded-lg bg-gray-50 flex gap-4 items-center">
            <!-- Image Edit -->
            <div class="w-16 h-16 rounded-full relative group cursor-pointer border border-gray-300 overflow-hidden flex-shrink-0 bg-gray-200">
               <input type="file" (change)="uploadImage($event, 'category', i)" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" title="Click to replace image">
               <img *ngIf="cat.image" [src]="cat.image" class="w-full h-full object-cover">
               <div class="absolute inset-0 flex items-center text-center justify-center opacity-0 group-hover:opacity-100 bg-black/50 pointer-events-none transition text-white font-bold text-[9px]">
                 Change
               </div>
            </div>
            <!-- Text Edit -->
            <div class="flex-1 space-y-2">
               <div>
                 <input type="text" [(ngModel)]="cat.name" [name]="'catname'+i" placeholder="Category Name" class="w-full px-2 py-1 text-sm font-bold border border-gray-300 rounded focus:ring-[#0F83B2] focus:border-[#0F83B2]">
               </div>
               <div>
                 <input type="text" [(ngModel)]="cat.link" [name]="'catlink'+i" placeholder="/shop?category=..." class="w-full px-2 py-1 text-xs text-gray-500 border border-gray-300 rounded focus:ring-[#0F83B2] focus:border-[#0F83B2]">
               </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Store Info -->
      <div>
        <h3 class="text-lg font-bold text-gray-900 border-b pb-2 mb-4">Core Store Details</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Store Name</label>
            <input type="text" [(ngModel)]="info.name" name="name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp Number</label>
            <input type="text" [(ngModel)]="info.whatsapp" name="whatsapp" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
          <div class="md:col-span-2">
            <label class="block text-sm font-medium text-gray-700 mb-1">Store Description (Footer)</label>
            <textarea [(ngModel)]="info.description" name="desc" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]"></textarea>
          </div>
        </div>
      </div>

      <!-- Contact Info -->
      <div>
        <h3 class="text-lg font-bold text-gray-900 border-b pb-2 mb-4">Contact Information</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contact Email</label>
            <input type="email" [(ngModel)]="info.email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Contact Phone</label>
            <input type="text" [(ngModel)]="info.phone" name="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 1</label>
            <input type="text" [(ngModel)]="info.addressLine1" name="add1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Address Line 2</label>
            <input type="text" [(ngModel)]="info.addressLine2" name="add2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
           <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Hours Line 1</label>
            <input type="text" [(ngModel)]="info.hoursLine1" name="h1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Hours Line 2</label>
            <input type="text" [(ngModel)]="info.hoursLine2" name="h2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-[#0F83B2] focus:border-[#0F83B2]">
          </div>
        </div>
      </div>

      <!-- Submit -->
      <div class="pt-4 flex justify-end">
         <button type="submit" class="w-full sm:w-auto px-8 py-3 bg-[#0F83B2] text-white font-bold rounded-full hover:bg-opacity-90 transition shadow-sm">
           Apply Changes to Live Site
         </button>
      </div>

    </form>
    
  </div>
</div>
