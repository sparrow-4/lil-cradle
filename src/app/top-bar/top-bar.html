<div class="bg-[#0F83B2] text-white py-1 relative z-30">
  <div class="max-w-[1440px] mx-auto flex justify-end items-center px-6 py-2 text-sm">
    <div class="space-x-4">

      <!-- Public / Not Logged In -->
      <ng-container *ngIf="!auth.isAdmin() && !auth.isLoggedUser()">
        <a routerLink="/login" class="hover:text-gray-200 transition font-medium">Login / Register</a>
      </ng-container>

      <!-- Logged in as User -->
      <ng-container *ngIf="auth.isLoggedUser()">
        <span class="font-bold">Welcome, Shopper!</span>
        <button (click)="logout()" class="hover:text-gray-200 transition opacity-80 pl-2">Logout</button>
      </ng-container>

      <!-- Logged in as Admin -->
      <ng-container *ngIf="auth.isAdmin()">
        <a routerLink="/admin/dashboard" class="font-bold hover:text-gray-200 transition">⚙️ Admin Dashboard</a>
        <button (click)="logout()" class="hover:text-gray-200 transition opacity-80 pl-2">Logout</button>
      </ng-container>

    </div>
  </div>

  <!-- Decorative Wave -->
  <div class="absolute -bottom-5 left-0 w-full leading-none z-30 pointer-events-none">
    <svg viewBox="0 0 1200 60" preserveAspectRatio="none" class="w-full h-5">
      <path
        d="M0,0 L0,30 Q30,60 60,30 T120,30 T180,30 T240,30 T300,30 T360,30 T420,30 T480,30 T540,30 T600,30 T660,30 T720,30 T780,30 T840,30 T900,30 T960,30 T1020,30 T1080,30 T1140,30 T1200,30 L1200,0 Z"
        fill="#0F83B2" />
    </svg>
  </div>
</div>
